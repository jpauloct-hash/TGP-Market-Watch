<style>
  :root {
    --bg: #0a0e14;
    --ring-bg: #141a24;
    --ring-track: #161d27;
    --ring-off: #3a4656;
    --face: #0f141c;
    --txt: #e8edf4;
    --txt-dim: #6b7888;
    --hour-num: #c4cdd9;
    --tick: #2a3543;
    --tick-major: #4a5868;
    --hand: #f2f5fa;
    --second: #ff4d4d;
    --center: #ff4d4d;
    --accent: #2ee6a0;
    --open-glow: rgba(46,230,160,0.35);
    --mkt-up: #2ee6a0;
    --mkt-down: #ff4d4d;
    --mkt-flat: #ffd23f;
    --mkt-unknown: var(--accent);
    --news-pulse: #ffd23f;
    --news-pulse-soft: rgba(255,210,63,0.45);
    --news-pulse-glow: rgba(255,210,63,0.38);
    --card: rgba(255,255,255,0.04);
    --card-line: rgba(255,255,255,0.08);
    --panel: #121822;
  }
  :root.light {
    --bg: #eef1f5;
    --ring-bg: #f7f9fb;
    --ring-track: #e4e8ee;
    --ring-off: #aab4c2;
    --face: #ffffff;
    --txt: #1a2230;
    --txt-dim: #8a95a5;
    --hour-num: #2a3340;
    --tick: #c4ccd6;
    --tick-major: #98a3b2;
    --hand: #1a2230;
    --second: #e23b3b;
    --center: #e23b3b;
    --accent: #16b97f;
    --open-glow: rgba(22,185,127,0.25);
    --mkt-up: #16b97f;
    --mkt-down: #e23b3b;
    --mkt-flat: #e0a500;
    --mkt-unknown: var(--accent);
    --news-pulse: #c89200;
    --news-pulse-soft: rgba(200,146,0,0.40);
    --news-pulse-glow: rgba(200,146,0,0.28);
    --card: rgba(0,0,0,0.03);
    --card-line: rgba(0,0,0,0.08);
    --panel: #ffffff;
  }
  :root.matrix {
    --bg: #000000;
    --ring-bg: #020a04;
    --ring-track: #051206;
    --ring-off: #0d3d18;
    --face: #010402;
    --txt: #28ff70;
    --txt-dim: #1a8a3f;
    --hour-num: #2eff7a;
    --tick: #0d3d18;
    --tick-major: #1f9c4a;
    --hand: #5bff95;
    --second: #aaffbf;
    --center: #5bff95;
    --accent: #39ff14;
    --open-glow: rgba(57,255,20,0.55);
    --mkt-up: #39ff14;
    --mkt-down: #ff3b3b;
    --mkt-flat: #f5e03b;
    --mkt-unknown: var(--accent);
    --news-pulse: #f5e03b;
    --news-pulse-soft: rgba(245,224,59,0.45);
    --news-pulse-glow: rgba(245,224,59,0.42);
    --card: rgba(20,80,30,0.12);
    --card-line: rgba(57,255,20,0.22);
    --panel: #020a04;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--txt);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    overflow-x: hidden;
    transition: background 0.4s ease, color 0.4s ease;
  }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100dvh; padding: calc(env(safe-area-inset-top) + 4vh) 16px calc(env(safe-area-inset-bottom) + 8vh); gap: 14px;
    position: relative;
  }
  #rain {
    position: fixed; inset: 0; width: 100%; height: 100%;
    z-index: 0; opacity: 0; pointer-events: none; transition: opacity 0.6s ease;
  }
  :root.matrix #rain { opacity: 1; }
  :root.matrix { background: #000 !important; }
  :root.matrix body { background: transparent !important; }
  body > *:not(#rain):not(#sheet):not(#overlay):not(#news-sheet):not(#news-overlay):not(#war-screen):not(#tv-chart-screen):not(#fred-chart-screen) { position: relative; z-index: 1; }
  .brand {
    width: min(92vw, 440px); display: flex; align-items: baseline; gap: 8px;
    padding: 0 4px 2px; user-select: none;
  }
  .brand-mark {
    font-size: 19px; font-weight: 800; letter-spacing: 0.02em; color: var(--accent);
  }
  .brand-name {
    font-size: 12px; font-weight: 600; letter-spacing: 0.34em; color: var(--txt-dim);
  }
  :root.matrix .brand-mark { text-shadow: 0 0 9px var(--open-glow); }
  .ticker {
    width: min(92vw, 440px); background: var(--card); border: 1px solid var(--card-line);
    border-radius: 14px; padding: 11px 15px; font-size: 12.5px; line-height: 1.4;
    display: flex; align-items: flex-start; gap: 9px;
  }
  .ticker .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    margin-top: 4px; flex-shrink: 0; box-shadow: 0 0 8px var(--accent); }
  .ticker .lbl { color: var(--txt-dim); font-weight: 600; }
  .clock-wrap { width: min(92vw, 440px); aspect-ratio: 1; position: relative; }
  svg { width: 100%; height: 100%; display: block; }
  .center-readout { position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
  .center-readout .next { font-size: 10.5px; color: var(--txt-dim); letter-spacing: 0.05em;
    text-transform: uppercase; margin-bottom: 3px; max-width: 130px; }
  .center-readout .time { font-size: 30px; font-weight: 300; color: var(--accent);
    font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
  .center-readout .tz { font-size: 10px; color: var(--txt-dim); letter-spacing: 0.1em; margin-top: 2px; }
  .status { width: min(92vw, 440px); display: flex; align-items: center;
    justify-content: space-between; font-size: 14.5px; }
  .status .left { display: flex; align-items: center; gap: 10px; font-weight: 600; }
  .status .pulse { width: 11px; height: 11px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 0 0 var(--open-glow); animation: pulse 2.4s infinite; }
  .status.closed .pulse { background: var(--txt-dim); animation: none; box-shadow: none; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 var(--open-glow); }
    70% { box-shadow: 0 0 0 12px rgba(0,0,0,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
  }
  .status .clock-utc { color: var(--txt-dim); font-variant-numeric: tabular-nums; letter-spacing: 0.03em; }
  .controls { display: flex; gap: 8px; width: min(94vw, 460px); }
  .btn { flex: 1; padding: 11px 6px; border-radius: 12px; border: 1px solid var(--card-line);
    background: var(--card); color: var(--txt); font-size: 12.5px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;
    transition: background 0.2s, transform 0.1s; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  /* pulso discreto só no botão Notícias (não afeta Ajustes/Tema) */
  #open-news { color: var(--news-pulse); border-color: var(--news-pulse);
    animation: newsPulse 2.4s ease-in-out infinite; }
  @keyframes newsPulse {
    0%, 100% { border-color: var(--news-pulse-soft); box-shadow: 0 0 0 rgba(0,0,0,0); text-shadow: none; }
    50% { border-color: var(--news-pulse); box-shadow: 0 0 12px var(--news-pulse-glow);
      text-shadow: 0 0 8px var(--news-pulse-glow); }
  }
  @media (prefers-reduced-motion: reduce) {
    #open-news { animation: none; box-shadow: none; text-shadow: none; }
  }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 50; }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel);
    border-radius: 20px 20px 0 0; padding: 22px 20px calc(env(safe-area-inset-bottom) + 24px);
    transform: translateY(100%); transition: transform 0.32s cubic-bezier(.3,.8,.3,1);
    z-index: 51; max-height: 82dvh; overflow-y: auto; max-width: 480px; margin: 0 auto; }
  .sheet.show { transform: translateY(0); }
  .sheet h2 { font-size: 17px; margin-bottom: 4px; }
  .sheet .sub { font-size: 12.5px; color: var(--txt-dim); margin-bottom: 18px; }
  .sheet .grip { width: 38px; height: 4px; border-radius: 2px; background: var(--card-line); margin: 0 auto 16px; }
  /* ── Painel de notícias (mesmo padrão visual do sheet) ── */
  #news-status { font-size: 11.5px; color: var(--txt-dim); margin-bottom: 12px; }
  #news-list { display: flex; flex-direction: column; gap: 8px; }
  .news-card { background: var(--card); border: 1px solid var(--card-line); border-left: 2px solid var(--accent);
    border-radius: 10px; padding: 12px 13px; display: flex; flex-direction: column; }
  .news-card.macro { border-left-color: var(--mkt-flat); }
  .news-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 8px; }
  .news-badge { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px;
    background: rgba(127,127,127,0.12); color: var(--accent); white-space: nowrap; }
  .news-card.macro .news-badge { color: var(--mkt-flat); }
  .news-time { font-size: 9.5px; color: var(--txt-dim); white-space: nowrap; }
  .news-title { font-size: 12.5px; color: var(--txt); font-weight: 600; line-height: 1.5; margin-bottom: 8px; }
  .news-expand-btn { align-self: flex-start; background: transparent; border: 1px solid var(--card-line);
    border-radius: 6px; color: var(--accent); font-size: 10.5px; font-weight: 700; padding: 4px 11px;
    cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .news-expand-btn:active { transform: scale(0.97); }
  .news-summary-box { display: none; background: var(--bg); border: 1px solid var(--card-line);
    border-radius: 7px; padding: 11px; margin-top: 8px; }
  .news-summary-box p { font-size: 11.5px; color: var(--txt-dim); line-height: 1.7; margin-bottom: 8px; white-space: pre-line; }
  .news-summary-box a { font-size: 10.5px; color: var(--accent); font-weight: 700; text-decoration: none; display: block; }
  .news-empty { padding: 26px 10px; text-align: center; color: var(--txt-dim); font-size: 12.5px; }
  /* painel de notícias como bottom sheet real (75% da tela, lista rola dentro) */
  #news-overlay { position: fixed; inset: 0; z-index: 60; }
  #news-sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 61;
    height: 75vh; height: 75dvh; max-height: 75dvh;
    max-width: 480px; margin: 0 auto;
    display: flex; flex-direction: column; overflow: hidden;
    background: var(--panel); border-radius: 20px 20px 0 0;
    padding: 22px 20px calc(env(safe-area-inset-bottom) + 18px);
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(.3,.8,.3,1);
  }
  #news-sheet.show { transform: translateY(0); }
  #news-sheet .grip, #news-sheet h2, #news-sheet .sub, #news-status, #news-done-btn { flex: 0 0 auto; }
  #news-list { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 12px; }
  /* ───────── Botão largo Tela de Guerra ───────── */
  .controls.war-row { margin-top: 8px; }
  .btn-war { flex: 1; font-weight: 700; letter-spacing: 0.04em;
    background: linear-gradient(135deg, var(--card), var(--card));
    border-color: var(--mkt-down); color: var(--mkt-down); }
  .btn-war:active { transform: scale(0.99); }
  /* ───────── Tela de Guerra (overlay tela cheia) ───────── */
  .war-screen {
    position: fixed; inset: 0; z-index: 80;
    background: var(--bg);
    display: flex; flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.34s cubic-bezier(.3,.8,.3,1);
    padding: calc(env(safe-area-inset-top) + 14px) 0 0;
  }
  .war-screen.show { transform: translateY(0); }
  /* reforço por ID (especificidade alta) para garantir overlay de tela cheia em todos os navegadores */
  #war-screen { position: fixed; inset: 0; z-index: 80; }
  .war-head { display: flex; align-items: center; justify-content: space-between;
    padding: 0 18px 10px; }
  .war-title { display: flex; flex-direction: column; line-height: 1.1; }
  .war-title-main { font-size: 18px; font-weight: 800; letter-spacing: 0.06em; color: var(--txt); }
  .war-title-sub { font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--mkt-down); margin-top: 3px; }
  .war-head-actions { display: flex; gap: 8px; }
  .war-refresh, .war-close { width: 38px; height: 38px; border-radius: 10px;
    border: 1px solid var(--card-line); background: var(--card); color: var(--txt);
    font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .war-refresh:active, .war-close:active { transform: scale(0.94); }
  .war-refresh.spin { animation: warSpin 0.6s linear; }
  @keyframes warSpin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  .war-updated { padding: 0 18px 12px; font-size: 11px; color: var(--txt-dim); }
  .war-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 0 14px calc(env(safe-area-inset-bottom) + 24px); }
  /* seções */
  .war-section { margin-bottom: 20px; }
  .war-section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--txt-dim); margin: 0 4px 9px; display: flex;
    align-items: center; gap: 8px; }
  .war-section-title::after { content: ""; flex: 1; height: 1px; background: var(--card-line); }
  /* grade de cards: empilha no celular, vira grid em telas largas */
  .war-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .war-grid.cols-1 { grid-template-columns: 1fr; }
  .war-grid.cols-3 { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .war-grid.cols-3 .war-card { padding: 8px 9px; gap: 2px; }
  .war-grid.cols-3 .war-card-label { font-size: 9.5px; letter-spacing: 0; }
  .war-grid.cols-3 .war-card-value { font-size: 15px; }
  .war-grid.cols-3 .war-card-meta { font-size: 9px; gap: 4px; flex-wrap: wrap; }
  .war-grid.cols-4 { grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .war-grid.cols-4 .war-card { padding: 8px 9px; gap: 2px; }
  .war-grid.cols-4 .war-card-label { font-size: 9.5px; letter-spacing: 0; }
  .war-grid.cols-4 .war-card-value { font-size: 15px; }
  .war-grid.cols-4 .war-card-meta { font-size: 9px; gap: 4px; flex-wrap: wrap; }
  @media (min-width: 480px) { .war-grid.cols-4 { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 560px) { .war-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 820px) { .war-grid { grid-template-columns: repeat(4, 1fr); } }
  /* card */
  .war-card { background: var(--card); border: 1px solid var(--card-line);
    border-radius: 12px; padding: 13px 14px; display: flex; flex-direction: column; gap: 3px;
    border-left: 3px solid var(--card-line); }
  .war-card.up { border-left-color: var(--mkt-up); }
  .war-card.down { border-left-color: var(--mkt-down); }
  .war-card.flat { border-left-color: var(--mkt-flat); }
  .war-card.official { border-left-color: var(--accent); }
  .war-card-label { font-size: 11px; color: var(--txt-dim); font-weight: 600;
    letter-spacing: 0.02em; }
  .war-card-value { font-size: 21px; font-weight: 750; color: var(--txt); line-height: 1.15;
    font-variant-numeric: tabular-nums; }
  .war-card-meta { font-size: 10.5px; font-weight: 600; display: flex; gap: 6px; align-items: baseline; }
  .war-chg { font-variant-numeric: tabular-nums; }
  .war-chg.up { color: var(--mkt-up); }
  .war-chg.down { color: var(--mkt-down); }
  .war-chg.flat { color: var(--mkt-flat); }
  .war-ref { color: var(--txt-dim); font-weight: 500; }
  /* card largo (copom, tesouro) ocupa a linha toda */
  .war-card.wide { grid-column: 1 / -1; }
  /* seletor de abas Brasil/EUA */
  .war-tabs { display: flex; gap: 6px; margin: 0 0 14px; }
  .war-tab { flex: 1; padding: 8px 0; font-size: 12px; font-weight: 700; letter-spacing: 0.04em;
    background: var(--card); color: var(--txt-dim); border: 1px solid var(--card-line);
    border-radius: 9px; cursor: pointer; transition: all .15s; }
  .war-tab.active { background: var(--accent); color: #06251a; border-color: var(--accent); }
  /* sub-bloco "Índices" dentro de Mercados Hoje (EUA): subtítulo + 1 linha de 3 cards */
  .war-subtitle { font-size: 9px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--txt-dim); margin: 0 0 6px 1px; }
  .war-idx-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
  .war-idx-row .war-card { padding: 8px 9px; gap: 2px; border-left-width: 3px; }
  /* layout de COLUNAS temáticas: SEMPRE 3 lado a lado, como uma tabela (igual à planilha) */
  .war-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .war-col { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .war-col-head { font-size: 9px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--txt-dim); padding: 2px 1px 0; line-height: 1.2; }
  /* cards dentro das colunas: compactos para caber 3 lado a lado no celular */
  .war-col .war-card { padding: 8px 9px; gap: 2px; border-left-width: 3px; }
  .war-col .war-card-label { font-size: 9.5px; letter-spacing: 0; }
  .war-col .war-card-value { font-size: 15px; font-weight: 700; }
  .war-col .war-card-meta { font-size: 9px; gap: 4px; flex-wrap: wrap; }
  .war-list-row { display: flex; justify-content: space-between; align-items: baseline;
    padding: 7px 0; border-bottom: 1px solid var(--card-line); }
  .war-list-row:last-child { border-bottom: none; }
  .war-list-name { font-size: 12.5px; color: var(--txt); font-weight: 600; }
  .war-list-sub { font-size: 10px; color: var(--txt-dim); font-weight: 500; }
  .war-list-val { font-size: 13px; font-weight: 700; color: var(--txt); font-variant-numeric: tabular-nums; }
  /* Copom: estados de linha do tempo (passado apagado / próxima em destaque / seguinte neutra) */
  .war-list-row.past .war-list-name, .war-list-row.past .war-list-val { color: var(--txt-dim); opacity: 0.7; }

// data local da bolsa no formato AAAA-MM-DD
function marketDateKey(now, tz){
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: tz, year:"numeric", month:"2-digit", day:"2-digit"
  }).formatToParts(now);
  const y = parts.find(p=>p.type==="year").value;
  const m = parts.find(p=>p.type==="month").value;
  const d = parts.find(p=>p.type==="day").value;
  return `${y}-${m}-${d}`;
}
// dia da semana local da bolsa (Sun..Sat)
function marketWeekday(now, tz){
  return new Intl.DateTimeFormat("en-US", { timeZone: tz, weekday:"short" }).format(now);
}
function isMarketWeekend(now, tz){
  const wd = marketWeekday(now, tz);
  return wd==="Sat" || wd==="Sun";
}
function isMarketHoliday(m, now){
  if(!m.calendar || !m.tz) return false;
  const cal = EXCHANGE_CALENDARS[m.calendar];
  if(!cal) return false;
  const dateKey = marketDateKey(now, m.tz);
  return Array.isArray(cal.closed) && cal.closed.includes(dateKey);
}
// abertura "de verdade": horário + não fim de semana local + não feriado
function isOpenNow(m, now){
  if(m.tz && isMarketWeekend(now, m.tz)) return false;
  if(isMarketHoliday(m, now)) return false;
  const utcH = now.getUTCHours() + now.getUTCMinutes()/60 + now.getUTCSeconds()/3600;
  return isOpenUTC(m, utcH);
}

let marketQuotes = {};
async function fetchMarketQuotes(){
  // só busca se a URL real do Worker já tiver sido colada
  if(!QUOTES_URL || QUOTES_URL==="COLE_AQUI_A_URL_REAL_DO_WORKER") return;
  try{
    const res = await fetch(QUOTES_URL, { cache: "no-store" });

    const data = await res.json();

// cor do arco quando o mercado está ABERTO.
// Nesta etapa, só saopaulo usa cotação; os demais usam a cor padrão.
function marketArcColor(m){
  if(m.id !== "saopaulo") return "var(--accent)";
  const q = marketQuotes[m.id];
  if(!q || q.changePct === null || q.changePct === undefined) return "var(--mkt-unknown)";
  const pct = Number(q.changePct);
  if(!Number.isFinite(pct)) return "var(--mkt-unknown)";
  if(pct >  0.05) return "var(--mkt-up)";
  if(pct < -0.05) return "var(--mkt-down)";
  return "var(--mkt-flat)";
}

let hourHand,secondHand;
function rebuild(){
  svg.innerHTML="";
  svg.appendChild(el("circle",{cx:CX,cy:CY,r:196,fill:"var(--ring-bg)"}));
  svg.appendChild(el("circle",{cx:CX,cy:CY,r:188,fill:"var(--face)"}));
  for(let h=1;h<=24;h++){
    const ang=hourToAngle(h),major=h%6===0;
    const a=polar(CX,CY,180,ang),b=polar(CX,CY,major?170:175,ang);
    svg.appendChild(el("line",{x1:a.x,y1:a.y,x2:b.x,y2:b.y,
      stroke:major?"var(--tick-major)":"var(--tick)","stroke-width":major?1.6:1}));
    const np=polar(CX,CY,188,ang);
    const t=el("text",{x:np.x,y:np.y,"text-anchor":"middle","dominant-baseline":"central",
      id:"hn-"+h, class:"hour-num"+(major?" cardinal":"")});
    t.textContent=h; svg.appendChild(t);
  }
  const sel=ALL_MARKETS.filter(m=>state.selected.has(m.id));
  const n=sel.length;
  const rOuter=168,rInner=Math.max(70,168-(n-1)*(n>8?12:16));
  const step=n>1?(rOuter-rInner)/(n-1):0;
  sel.forEach((m,i)=>{
    const radius=n>1?rOuter-i*step:130;
    const lo=toLocal(m.open),lc=toLocal(m.close);
    svg.appendChild(el("path",{d:arcPath(CX,CY,radius,0.01,23.99),fill:"none",
      stroke:"var(--ring-track)","stroke-width":ARC_W,"stroke-linecap":"butt"}));
    svg.appendChild(el("path",{d:arcPath(CX,CY,radius,lo,lc),fill:"none",
      "stroke-width":ARC_W,"stroke-linecap":"round",class:"open-arc",id:"arc-"+m.id}));

    // caminho invisível para o texto curvo correr sobre o arco
    let span=(lc-lo+24)%24;
    // ângulo do meio do arco decide se estamos na metade de cima ou de baixo
    const midAng=(hourToAngle((lo+span/2)%24)+360)%360;
    const bottom = midAng>0 && midAng<180; // metade inferior do círculo
    // metade de cima: caminho normal, texto começa no início do arco.
    // metade de baixo: caminho reverso (anti-horário) e texto centralizado,
    // para o nome ficar em posição normal de leitura, dentro do arco.
    const pid="lblpath-"+m.id;
    // o arco VISUAL continua em radius; só o caminho do TEXTO recebe o offset.
    const labelRadius = bottom ? radius - LABEL_RADIUS_OFFSET : radius + LABEL_RADIUS_OFFSET;
    const labelPathD = bottom
      ? arcPathReverse(CX,CY,labelRadius,lo,lc)
      : arcPath(CX,CY,labelRadius,lo,lc);
    const lpath=el("path",{id:pid,d:labelPathD,fill:"none",stroke:"none"});
    svg.appendChild(lpath);

    const txt=el("text",{class:"arc-label",id:"lbl-"+m.id});
    const tp=el("textPath",{href:"#"+pid,
      startOffset: bottom ? "96%" : "4%",
      "text-anchor": bottom ? "end" : "start",
      dy: bottom ? "-0.10em" : "0.34em"});
    tp.textContent=mlabel(m);
    txt.appendChild(tp);
    svg.appendChild(txt);
  });
  hourHand=el("line",{x1:CX,y1:CY,x2:CX,y2:CY-66,stroke:"var(--hand)","stroke-width":5,"stroke-linecap":"round"});
  secondHand=el("line",{x1:CX,y1:CY+22,x2:CX,y2:CY-150,stroke:"var(--second)","stroke-width":1.3,"stroke-linecap":"round"});
  svg.appendChild(hourHand); svg.appendChild(secondHand);
  svg.appendChild(el("circle",{cx:CX,cy:CY,r:5.5,fill:"var(--center)"}));
}
function update(){
  const now=getNow();
  const utcH=now.getUTCHours()+now.getUTCMinutes()/60+now.getUTCSeconds()/3600;
  const localH=toLocal(utcH);
  const lh=Math.floor(localH),lm=Math.floor((localH-lh)*60);
  hourHand.setAttribute("transform",`rotate(${hourToAngle(localH)+90} ${CX} ${CY})`);
  const s=now.getUTCSeconds()+now.getUTCMilliseconds()/1000;
  secondHand.setAttribute("transform",`rotate(${s/60*360} ${CX} ${CY})`);
  let anyOpen=false,openNames=[];
  const sel=ALL_MARKETS.filter(m=>state.selected.has(m.id));
  sel.forEach(m=>{
    const arc=document.getElementById("arc-"+m.id),lbl=document.getElementById("lbl-"+m.id);
    if(!arc)return;
    if(isOpenNow(m, now)){ arc.setAttribute("stroke", marketArcColor(m));
      arc.style.filter="drop-shadow(0 0 5px var(--open-glow))"; lbl.classList.add("open");
      anyOpen=true; openNames.push(mlabel(m));
    } else { arc.setAttribute("stroke","var(--ring-off)"); arc.style.filter="none"; lbl.classList.remove("open"); }
  });
  const pad=n=>String(n).padStart(2,"0");
  // destaca o número da hora vigente no anel
  const curHourNum=Math.floor(localH)===0?24:Math.floor(localH);
  for(let hh=1;hh<=24;hh++){
    const node=document.getElementById("hn-"+hh);
    if(node) node.classList.toggle("now", hh===curHourNum);
  }
  document.getElementById("utc-foot").textContent=`${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}`;
  const status=document.getElementById("status"),statusText=document.getElementById("status-text");
  if(anyOpen){ status.classList.remove("closed");
    statusText.textContent=openNames.length>1?`Aberto \u00b7 ${openNames.length} mercados`:`Aberto \u00b7 ${openNames[0]}`;
  } else { status.classList.add("closed"); statusText.textContent="Mercados fechados"; }
  requestAnimationFrame(update);
}
function tzName(off){ const sign=off>=0?"+":"-",a=Math.abs(off),h=Math.floor(a),m=Math.round((a-h)*60);
  return `GMT${sign}${h}${m?":"+String(m).padStart(2,"0"):""}`; }
function refreshTzLabels(){
  document.getElementById("event-text").textContent=`Seu fuso: ${tzName(state.tzOffset)} \u00b7 ${state.selected.size} mercados`;

function buildSettings(){
  const sel=document.getElementById("tz-select");
  TZ_OPTIONS.forEach(o=>{ const opt=document.createElement("option");
    opt.value=o; opt.textContent=tzName(o);
    if(Math.abs(o-state.tzOffset)<0.01) opt.selected=true; sel.appendChild(opt); });

    item.innerHTML=`<div class="sw">${state.selected.has(m.id)?"\u2713":""}</div>
      <div class="nm">${m.name}<span class="idx"> \u00b7 ${m.index}</span></div>
      <div class="hrs">${pad(oh)}:${pad(om)}\u2013${pad(ch)}:${pad(cm)} UTC</div>`;
    item.addEventListener("click",()=>{

        state.selected.delete(m.id); item.classList.remove("on"); item.querySelector(".sw").textContent="";

      rebuild(); refreshTzLabels();
    });
    list.appendChild(item);
  });

  // seletor cidade / índice
  const seg=document.getElementById("label-seg");

    state.labelMode=b.dataset.mode; syncSeg(); rebuild(); refreshTzLabels();
  }));
  syncSeg();
}
// ---- Matrix digital rain ----
const rain=document.getElementById("rain");
const rctx=rain.getContext("2d");
const GLYPHS="01ﾊﾐﾋｰｳｼﾅﾓﾆｻﾜﾂｵﾘｱﾎﾃﾏｹﾒｴｶｷﾑﾕﾗｾﾈｽﾀﾇﾍ｜ﾁｺ$+*<>".split("");
let cols=[], colW=14, running=false, rafRain;
function sizeRain(){
  rain.width=window.innerWidth; rain.height=window.innerHeight;
  const n=Math.floor(rain.width/colW);
  cols=Array.from({length:n},()=>Math.random()*-rain.height);
}
let lastStep=0;
const RAIN_STEP_MS=115; // intervalo entre quedas — maior = mais lenta
function drawRain(ts){
  if(!lastStep) lastStep=ts||0;
  const advance=(ts-lastStep)>=RAIN_STEP_MS;
  if(advance){
    lastStep=ts;
    rctx.fillStyle="rgba(0,0,0,0.10)";
    rctx.fillRect(0,0,rain.width,rain.height);
    rctx.font=colW+"px monospace";
    for(let i=0;i<cols.length;i++){
      const ch=GLYPHS[Math.floor(Math.random()*GLYPHS.length)];
      const x=i*colW, y=cols[i];
      rctx.fillStyle="#39ff14";
      rctx.fillText(ch,x,y);
      rctx.fillStyle="rgba(57,255,20,0.35)";
      rctx.fillText(GLYPHS[Math.floor(Math.random()*GLYPHS.length)],x,y-colW*1.5);
      if(y>rain.height && Math.random()>0.975) cols[i]=0;
      else cols[i]=y+colW;
    }
  }
  rafRain=requestAnimationFrame(drawRain);
}
function startRain(){ if(running)return; running=true; lastStep=0; sizeRain();
  rctx.fillStyle="#000"; rctx.fillRect(0,0,rain.width,rain.height); requestAnimationFrame(drawRain); }
function stopRain(){ running=false; cancelAnimationFrame(rafRain); rctx.clearRect(0,0,rain.width,rain.height); }
window.addEventListener("resize",()=>{ if(running) sizeRain(); });

const TGP_NEWS_REFRESH = 15 * 60 * 1000; // 15 min
let tgpNewsCache = (function(){
  try { const n = JSON.parse(localStorage.getItem("tgp_news_cache_v1") || "[]"); return Array.isArray(n)?n:[]; }
  catch(e){ return []; }
})();
let tgpNewsLastFetch = 0;
let tgpNewsFetching = false;

function tgpSetNewsStatus(msg){
  const s=document.getElementById("news-status");
  if(s) s.textContent = msg || "";
}

function tgpFetchNews(){
  if(tgpNewsFetching) return;
  const now = Date.now();
  if(now - tgpNewsLastFetch < TGP_NEWS_REFRESH && tgpNewsCache.length) { tgpRenderNewsPanel(); return; }
  tgpNewsFetching = true;
  tgpNewsLastFetch = now;
  if(!tgpNewsCache.length) tgpSetNewsStatus("Buscando notícias...");

  const RSS2JSON = "https://api.rss2json.com/v1/api.json?rss_url=";
  const feeds = [
    {url:"https://www.infomoney.com.br/feed/",                     label:"InfoMoney",  type:"company", lang:"pt"},
    {url:"https://valoreconomico.globo.com/rss/financas/",         label:"Valor",      type:"company", lang:"pt"},
    {url:"https://agenciabrasil.ebc.com.br/rss/economia/feed.xml", label:"Ag.Brasil",  type:"macro",   lang:"pt"},
    {url:"https://exame.com/invest/feed/",                         label:"Exame",      type:"company", lang:"pt"},
    {url:"https://www.moneytimes.com.br/feed/",                    label:"MoneyTimes", type:"macro",   lang:"pt"},
    {url:"https://www.cnbc.com/id/10000664/device/rss/rss.html",   label:"CNBC",       type:"macro",   lang:"en"},
    {url:"https://feeds.bbci.co.uk/news/business/rss.xml",         label:"BBC",        type:"macro",   lang:"en"}
  ];
  const TICKERS = ["PETR4","VALE3","ITUB4","BBDC4","ABEV3","B3SA3","WEGE3","SUZB3"];

  let allNews=[], completed=0, total=feeds.length, anyOk=false;

  function tgpTryDone(){
    completed++;
    if(completed < total) return;
    tgpNewsFetching = false;
    if(!anyOk && !allNews.length){
      // todas as fontes falharam
      if(tgpNewsCache.length){
        tgpSetNewsStatus("Não foi possível atualizar agora. Exibindo últimas notícias salvas.");
      } else {
        tgpSetNewsStatus("");
        const list=document.getElementById("news-list");
        if(list) list.innerHTML='<div class="news-empty">Não foi possível carregar notícias agora. Tente novamente em instantes.</div>';
      }
      return;
    }
    allNews.sort((a,b)=> b.ts - a.ts);
    const seen={};
    tgpNewsCache = allNews.filter(n=>{
      const key=n.title.slice(0,40);
      if(seen[key]) return false; seen[key]=true; return true;
    }).slice(0,30);
    tgpNewsCache.forEach((n,i)=>{ n.id=i+1; });
    try { localStorage.setItem("tgp_news_cache_v1", JSON.stringify(tgpNewsCache)); } catch(e){}
    tgpSetNewsStatus(tgpNewsCache.length + " notícias");
    tgpRenderNewsPanel();
  }

  feeds.forEach(feed=>{
    fetch(RSS2JSON + encodeURIComponent(feed.url) + "&count=10")
      .then(r=> r.json())
      .then(data=>{
        if(data && (data.status==="ok" || data.items)) anyOk=true;
        (data.items||[]).forEach(item=>{
          const title=(item.title||"").trim();
          const link=item.link||item.guid||"";
          if(!title || title.length<10) return;
          const lower=title.toLowerCase();
          const isIntl = feed.lang==="en";
          const blocked=/iphone|swarovski|bracelete|vinho|celular|notebook|desconto|oferta|promocao|black friday|cupom/.test(lower);
          if(blocked) return;
          let relevant;
          if(isIntl){
            relevant=/market|stock|economy|gdp|inflation|fed|rate|bank|trade|tariff|bond|oil|gold|dollar|euro|china|recession|growth|debt|deficit|sanction|geopolit|opec|treasury|nasdaq|dow|s&p|wall street|interest|central bank|imf|emerging/.test(lower);
          } else {
            relevant=/bolsa|ibovespa|selic|banco central|juros|cvm|acoes|acao|mercado|b3|petrobras|vale|itau|bradesco|ambev|weg|embraer|dividendo|resultado|lucro|receita|economia|inflacao|cambio|dolar|credito|bovespa|investimento|fiscal|fazenda|pib|copom|tesouro|fundo|fii|etf|commodities|petroleo|exportacao/.test(lower);
          }
          if(!relevant) return;
          let ticker="";
          TICKERS.forEach(t=>{ if(title.toUpperCase().indexOf(t)>=0) ticker=t; });
          const ts=item.pubDate ? new Date(item.pubDate).getTime() : (Date.now()-allNews.length*60000);
          const mins=Math.floor((Date.now()-ts)/60000);
          const timeStr= mins<1?"agora": mins<60?"há "+mins+"min": mins<1440?"há "+Math.floor(mins/60)+"h":"há "+Math.floor(mins/1440)+"d";
          let desc=(item.description||item.content||"").replace(/<[^>]+>/g,"").trim();
          if(desc.length>800) desc=desc.slice(0,800)+"...";
          allNews.push({ title, source:feed.label, type:ticker?"company":feed.type, ticker, time:timeStr, url:link, ts, desc, lang:feed.lang||"pt" });
        });
        tgpTryDone();
      })
      .catch(()=> tgpTryDone());
  });
}

function tgpRenderNewsPanel(){
  const list=document.getElementById("news-list");
  if(!list) return;
  if(!tgpNewsCache.length){
    list.innerHTML='<div class="news-empty">Buscando notícias...</div>';
    return;
  }
  list.innerHTML="";
  tgpNewsCache.forEach(item=>{
    const card=document.createElement("div");

    card.id="tgp-ni-"+item.id;

    top.appendChild(badge); top.appendChild(time);

function tgpFetchSummary(item, cardEl){
  const btn=cardEl.querySelector(".news-expand-btn");
  const box=cardEl.querySelector(".news-summary-box");
  if(!btn || !box) return;
  if(box.style.display==="block"){ box.style.display="none"; btn.textContent="Ver resumo"; return; }
  tgpShowSummaryInCard(cardEl, item);
}

function tgpShowSummaryInCard(cardEl, item){
  const btn=cardEl.querySelector(".news-expand-btn");
  const box=cardEl.querySelector(".news-summary-box");
  if(!btn || !box) return;
  box.style.display="block"; box.innerHTML="";

  function renderSummary(text){
    box.innerHTML="";
    const p=document.createElement("p");
    p.textContent=text;
    box.appendChild(p);
    if(item.url){
      const a=document.createElement("a");
      a.href=item.url; a.target="_blank"; a.rel="noopener";
      a.textContent="Ler notícia completa";
      box.appendChild(a);
    }
    btn.textContent="Fechar"; btn.disabled=false;
  }

  if(item.desc && item.desc.length>80 && item.desc!==item.title){ renderSummary(item.desc); return; }

  btn.textContent="Carregando..."; btn.disabled=true;
  if(!item.url){ renderSummary(item.title); return; }

  fetch("https://api.allorigins.win/get?url="+encodeURIComponent(item.url))
    .then(r=> r.json())
    .then(data=>{
      const html=data.contents||"";
      if(!html){ renderSummary(item.title); return; }
      const doc=new DOMParser().parseFromString(html,"text/html");
      ["script","style","nav","header","footer","aside","figure","iframe"].forEach(tag=>{
        const els=doc.querySelectorAll(tag);
        for(let i=els.length-1;i>=0;i--) els[i].parentNode.removeChild(els[i]);
      });
      const paras=doc.querySelectorAll("p, article p, .content p, .article-body p");
      const texts=[];
      for(let i=0;i<paras.length;i++){
        const t=paras[i].textContent.trim();
        if(t.length>80 && texts.indexOf(t)===-1) texts.push(t);
        if(texts.length>=5) break;
      }
      if(!texts.length){ renderSummary(item.title); return; }
      let summary=texts.join("\n\n");
      if(summary.length>900) summary=summary.slice(0,900)+"...";
      renderSummary(summary);
    })
    .catch(()=> renderSummary(item.title));
}

// monta o HTML do gráfico (cabeçalho + SVG de linha) a partir do payload do Worker
let fredChartState=null; // geometria do gráfico atual (para o crosshair)

function fredChartHTML(data){
  const pts=data.points;
  const last=pts[pts.length-1];
  const unit=data.unit||"";
  const fmt=v=> (Math.round(v*100)/100).toString().replace(".",",")+unit;
  const refDate=last.date ? ("ref. "+last.date.split("-").reverse().join("/")) : "";

  // dimensões do gráfico
  const W=320, H=180, padL=8, padR=8, padT=10, padB=22;
  const ys=pts.map(p=>p.value);
  const minY=Math.min(...ys), maxY=Math.max(...ys);
  const rangeY=(maxY-minY)||1;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const X=i=> padL + (i/(pts.length-1||1))*plotW;
  const Y=v=> padT + (1-(v-minY)/rangeY)*plotH;

  // guarda a geometria para o crosshair localizar pontos depois
  fredChartState={ pts, unit, W, H, padL, padR, padT, padB, plotW, plotH,
    X, Y, minY, maxY, fmt };

  let d="";
  pts.forEach((p,i)=>{ d += (i===0?"M":"L")+X(i).toFixed(1)+" "+Y(p.value).toFixed(1)+" "; });
  const areaD = d + "L"+X(pts.length-1).toFixed(1)+" "+(padT+plotH)+" L"+X(0).toFixed(1)+" "+(padT+plotH)+" Z";

  const idxs=[0, Math.floor(pts.length/2), pts.length-1];
  const xLabels=idxs.map(i=>{
    const mm=pts[i].date.slice(5,7), yy=pts[i].date.slice(2,4);
    return '<text class="fred-axis-lbl" x="'+X(i).toFixed(1)+'" y="'+(H-6)+'" text-anchor="'+(i===0?"start":i===pts.length-1?"end":"middle")+'">'+mm+"/"+yy+'</text>';
  }).join("");
  const yLabels=
    '<text class="fred-axis-lbl" x="'+(W-padR)+'" y="'+(Y(maxY)-2).toFixed(1)+'" text-anchor="end">'+fmt(maxY)+'</text>'+
    '<text class="fred-axis-lbl" x="'+(W-padR)+'" y="'+(Y(minY)).toFixed(1)+'" text-anchor="end">'+fmt(minY)+'</text>';

  // elementos do crosshair (ocultos até o toque)
  const crosshair=
    '<line id="fred-cross-x" class="fred-cross" x1="0" y1="'+padT+'" x2="0" y2="'+(padT+plotH)+'" style="display:none"/>'+
    '<circle id="fred-cross-dot" class="fred-cross-dot" cx="0" cy="0" r="3.5" style="display:none"/>';

  return ''+
    '<div class="fred-plot">'+
      '<div class="fred-head-val">Último: '+fmt(last.value)+'</div>'+
      '<div class="fred-head-ref">'+refDate+'</div>'+
      fredPeriodButtonsHTML(data.seriesId || fredChartActiveSeries || "DGS10", data.period || fredChartActivePeriod || "1y")+
      '<div class="fred-svg-wrap" style="position:relative">'+
        '<svg id="fred-svg" viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet" style="touch-action:none">'+
          '<line class="fred-axis" x1="'+padL+'" y1="'+(padT+plotH)+'" x2="'+(W-padR)+'" y2="'+(padT+plotH)+'"/>'+
          '<path class="fred-area" d="'+areaD+'"/>'+
          '<path class="fred-line" d="'+d.trim()+'"/>'+
          xLabels+yLabels+crosshair+
        '</svg>'+
        '<div id="fred-tooltip" class="fred-tooltip" style="display:none"></div>'+
      '</div>'+
      '<div class="fred-foot">Fonte: FRED · '+(data.seriesId||"")+'</div>'+
    '</div>';
}

// liga o crosshair (Pointer Events) ao SVG recém-inserido
function fredAttachCrosshair(){
  const svg=document.getElementById("fred-svg");
  const xLine=document.getElementById("fred-cross-x");
  const dot=document.getElementById("fred-cross-dot");
  const tip=document.getElementById("fred-tooltip");
  if(!svg||!xLine||!dot||!tip||!fredChartState) return;
  const st=fredChartState;

  function hide(){
    xLine.style.display="none"; dot.style.display="none"; tip.style.display="none";
  }
  // converte X de pixel da tela → coordenada do viewBox SVG
  function clientXToSvg(clientX){
    const rect=svg.getBoundingClientRect();
    const rel=(clientX-rect.left)/rect.width;       // 0..1
    return rel*st.W;                                  // coordenada no viewBox
  }
  function update(clientX){
    const svgX=clientXToSvg(clientX);
    // índice do ponto mais próximo (inverte a função X)
    let i=Math.round(((svgX-st.padL)/st.plotW)*(st.pts.length-1));
    i=Math.max(0, Math.min(st.pts.length-1, i));
    const p=st.pts[i];
    const px=st.X(i), py=st.Y(p.value);
    // linha vertical + bolinha
    xLine.setAttribute("x1",px); xLine.setAttribute("x2",px);
    xLine.style.display="";
    dot.setAttribute("cx",px); dot.setAttribute("cy",py);
    dot.style.display="";
    // tooltip (data · valor), reposicionado para não sair da tela
    const dataBR=p.date.split("-").reverse().join("/");
    tip.textContent=dataBR+" · "+st.fmt(p.value);
    tip.style.display="";
    const wrapW=svg.getBoundingClientRect().width;
    const pxScreen=(px/st.W)*wrapW;                  // posição em px na tela
    const tipW=tip.offsetWidth||120;
    let left=pxScreen-tipW/2;
    if(left<2) left=2;
    if(left+tipW>wrapW-2) left=wrapW-tipW-2;
    tip.style.left=left+"px";
  }

  svg.addEventListener("pointerdown", e=>{ svg.setPointerCapture(e.pointerId); update(e.clientX); });
  svg.addEventListener("pointermove", e=>{ if(e.pressure>0 || e.buttons>0 || e.pointerType==="touch"){ update(e.clientX); } });
  svg.addEventListener("pointerup", hide);
  svg.addEventListener("pointerleave", hide);
  svg.addEventListener("pointercancel", hide);
}

// ── Curva de Juros dos Treasuries (substitui o CME FedWatch) ──
const YIELD_CURVE_ENDPOINT="https://tgp-market-quotes.jpauloct.workers.dev?yieldCurve=1";
// cores fixas por momento (chip ativo = cor da linha = legenda)
const YC_COLORS={ hoje:"#34d399", "1s":"#60a5fa", "1m":"#a78bfa", "3m":"#fb923c", "6m":"#f472b6", "1a":"#22d3ee" };
const YC_DEFAULT=["hoje","3m","1a"];   // padrão ao abrir
const YC_MAX=3;                          // máximo de curvas simultâneas
let ycData=null;                         // dados do Worker (cacheados na sessão)
let ycSelected=YC_DEFAULT.slice();       // momentos ativos

function warRenderYieldCurve(section){
  const wrap=document.createElement("div");
  wrap.className="war-card official wide yc-card";
  wrap.innerHTML='<div class="yc-state">Carregando curva…</div>';
  // dispara o fetch (uma vez por abertura; reusa se já tem)
  if(ycData){ ycPaint(wrap, section); }
  else{
    fetch(YIELD_CURVE_ENDPOINT, { cache:"no-store" })
      .then(r=>r.json())
      .then(d=>{ if(!d||!d.ok||!d.curves) throw new Error("sem dados"); ycData=d; ycPaint(wrap, section); })
      .catch(()=>{ wrap.innerHTML='<div class="yc-state">Não foi possível carregar a curva agora.</div>'; });
  }
  return wrap;
}

// desenha os chips + o gráfico dentro do card
function ycPaint(wrap, section){
  const d=ycData;
  // chips (botão = legenda, na cor da linha)
  let chips='<div class="yc-chips">';
  d.moments.forEach(m=>{
    const on=ycSelected.includes(m.key);
    const col=YC_COLORS[m.key]||"#888";
    chips += '<button type="button" class="yc-chip'+(on?" on":"")+'" data-key="'+m.key+'" '+
      'style="'+(on?("background:"+col+";border-color:"+col+";color:#06251a"):("color:"+col+";border-color:"+col))+'">'+
      m.label+'</button>';
  });
  chips+='</div>';
  const foot=section.foot?('<div class="yc-foot">'+section.foot+'</div>'):"";
  wrap.innerHTML=chips+'<div class="yc-plot-wrap">'+ycSvg(d)+'</div>'+foot;
  // liga os chips
  wrap.querySelectorAll(".yc-chip").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const k=btn.dataset.key;
      const i=ycSelected.indexOf(k);
      if(i>=0){ ycSelected.splice(i,1); }       // desmarca
      else{
        ycSelected.push(k);
        if(ycSelected.length>YC_MAX) ycSelected.shift(); // tira o mais antigo
      }
      ycPaint(wrap, section);
    });
  });
}

// monta o SVG da curva (até 3 momentos sobrepostos, 8 vértices)
function ycSvg(d){
  const verts=d.vertices, n=verts.length;
  const sel=ycSelected.filter(k=>d.curves[k]); // só os que têm dados
  // coleta todos os valores visíveis p/ escala Y
  let vals=[];
  sel.forEach(k=> d.curves[k].points.forEach(v=>{ if(v!=null) vals.push(v); }));
  if(!vals.length){ return '<div class="yc-state">Selecione ao menos um período.</div>'; }
  const minY=Math.min(...vals), maxY=Math.max(...vals);
  const pad=(maxY-minY)*0.15||0.1;
  const lo=minY-pad, hi=maxY+pad, range=(hi-lo)||1;

  const W=320, H=190, padL=30, padR=10, padT=12, padB=26;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const X=i=> padL + (i/(n-1))*plotW;          // vértices equidistantes
  const Y=v=> padT + (1-(v-lo)/range)*plotH;

  // grade Y (3 linhas) + rótulos
  let grid="";
  for(let g=0; g<=2; g++){
    const val=lo+ (range*g/2);
    const yy=Y(val);
    grid += '<line class="yc-grid" x1="'+padL+'" y1="'+yy.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+yy.toFixed(1)+'"/>'+
      '<text class="yc-axis-lbl" x="'+(padL-4)+'" y="'+(yy+3).toFixed(1)+'" text-anchor="end">'+val.toFixed(1).replace(".",",")+'</text>';
  }
  // rótulos X (vértices)
  let xlabels="";
  verts.forEach((v,i)=>{ xlabels += '<text class="yc-axis-lbl" x="'+X(i).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle">'+v+'</text>'; });

  // linhas de cada momento selecionado
  let lines="";
  sel.forEach(k=>{
    const c=d.curves[k], col=YC_COLORS[k]||"#888";
    let dd="";
    c.points.forEach((v,i)=>{ if(v==null) return; dd += (dd===""?"M":"L")+X(i).toFixed(1)+" "+Y(v).toFixed(1)+" "; });
    lines += '<path d="'+dd.trim()+'" fill="none" stroke="'+col+'" stroke-width="2"/>';
    // bolinhas nos vértices
    c.points.forEach((v,i)=>{ if(v==null) return; lines += '<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(v).toFixed(1)+'" r="2.4" fill="'+col+'"/>'; });
  });

  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet">'+
    grid+xlabels+lines+'</svg>';
}

function warRender(data){
  // aceita: warRender(data) → usa data.sections (Brasil, compat)
  //         warRender(sectionsArray) → renderiza a lista passada (usado nas abas)
  const sections = Array.isArray(data) ? data : (data && data.sections) || [];
  const body=document.getElementById("war-body");
  body.innerHTML="";
  sections.forEach(section=>{
    const sec=document.createElement("div"); sec.className="war-section";
    const title=document.createElement("div"); title.className="war-section-title";
    title.textContent=section.title;
    sec.appendChild(title);
    if(section.layout==="list"){
      sec.appendChild(warRenderListCard(section.items));
    } else if(section.layout==="table"){
      sec.appendChild(warRenderTable(section));
    } else if(section.layout==="us-markets"){
      sec.appendChild(warRenderUsMarkets(section));
    } else if(section.layout==="yield-curve"){
      sec.appendChild(warRenderYieldCurve(section));
    } else if(section.layout==="columns"){
      const cols=document.createElement("div"); cols.className="war-cols";
      section.columns.forEach(col=>{
        const c=document.createElement("div"); c.className="war-col";
        if(col.head){ const h=document.createElement("div"); h.className="war-col-head"; h.textContent=col.head; c.appendChild(h); }
        col.items.forEach(it=> c.appendChild(warRenderCard(it)));
        cols.appendChild(c);
      });
      sec.appendChild(cols);
    } else if(section.layout==="cards"){
      const grid=document.createElement("div");
      grid.className="war-grid"+(section.cols===4?" cols-4":section.cols===3?" cols-3":section.cols===1?" cols-1":"");
      section.items.forEach(it=> grid.appendChild(warRenderCard(it)));
      sec.appendChild(grid);
    } else {
      // layout desconhecido: não quebrar a Tela de Guerra; ignorar silenciosamente
      console.warn("Layout desconhecido na Tela de Guerra:", section.layout);
    }
    body.appendChild(sec);
  });
  // horário da última atualização (só quando recebe o objeto data completo)
  if(!Array.isArray(data)){
    const upd=document.getElementById("war-updated");
    const d = data.updatedAt ? new Date(data.updatedAt) : new Date();
    const hh=String(d.getHours()).padStart(2,"0");
    const mm=String(d.getMinutes()).padStart(2,"0");
    upd.textContent="Atualizado às "+hh+":"+mm;
  }
}

function fomcTodayISO(){
  try{ return marketDateKey(getNow(), "America/New_York"); }
  catch(e){ return new Date().toISOString().slice(0,10); }
}
function fomcSub(m){ return m && m.sep ? "FOMC · SEP/dot plot" : "FOMC"; }
function fomcExtra(m){
  const parts=[];
  if(m && m.statement) parts.push(m.statement);
  if(m && m.sep) parts.push("SEP / dot plot");
  // Horários oficiais do comunicado/coletiva no segundo dia da reunião.
  parts.push("comunicado 14h ET · coletiva 14h30 ET");
  return parts.join(" · ");
}
function warFomcSection(){
  const today = fomcTodayISO();
  const past = FOMC_MEETINGS.filter(m => m.end < today);
  const future = FOMC_MEETINGS.filter(m => m.end >= today);
  const last = past.length ? past[past.length - 1] : null;
  const next = future[0] || null;
  const later = future[1] || null;
  const items = [];
  if(last){ items.push({ name:"Última reunião", sub:fomcSub(last), val:last.label, when:"past", extra:fomcExtra(last) }); }
  if(next){ items.push({ name:"Próxima reunião", sub:fomcSub(next), val:next.label, when:"next" }); }
  if(later){ items.push({ name:"Reunião seguinte", sub:fomcSub(later), val:later.label, when:"later" }); }
  if(!items.length){ items.push({ name:"Próxima reunião", sub:"FOMC", val:"a definir", when:"next" }); }
  return { title:"FOMC", layout:"list", items };
}

// renderiza a aba ativa a partir do que está em warLastData
// mescla seções: usa a real do Worker quando existir (por título); senão, a do mock.
// preserva a ORDEM do mock (Panorama → Mercados → FedWatch → FOMC).
function warMergeUsSections(){
  const mock = warUsMockSections();
  const real = (warLastData && warLastData.us && Array.isArray(warLastData.us.sections))
    ? warLastData.us.sections : [];
  const byTitle = {};
  real.forEach(s=>{ if(s && s.title) byTitle[s.title]=s; });
  return mock.map(m => byTitle[m.title] || m);
}

function warRenderActiveTab(){
  if(warTab==="us"){
    // dados reais do Worker (Panorama/Mercados via FRED) + mock no resto (FedWatch/FOMC)
    warRender(warMergeUsSections());
    setWarSubtitle("Mercado EUA");
  } else {
    if(warLastData) warRender(warLastData);
    setWarSubtitle("Mercado Brasil");
  }
}

function setWarSubtitle(txt){
  const sub=document.querySelector(".war-title-sub");
  if(sub) sub.textContent=txt;
}

function warSetTab(tab){
  warTab = (tab==="us") ? "us" : "br";
  document.querySelectorAll(".war-tab").forEach(b=>{
    b.classList.toggle("active", b.dataset.tab===warTab);
  });
  warRenderActiveTab();
}

function warShowMessage(msg, isError){
  const body=document.getElementById("war-body");
  body.innerHTML="";
  const box=document.createElement("div");
  box.className="war-state"+(isError?" err":"");
  box.textContent=msg;
  body.appendChild(box);
}

async function warLoad(){
  if(warLoading) return;
  warLoading=true;
  const upd=document.getElementById("war-updated");
  warShowMessage("Carregando dados do mercado…", false);
  upd.textContent="";
  try{
    const res=await fetch(WAR_ENDPOINT, { cache: "no-store" });
    if(!res.ok) throw new Error("http_"+res.status);
    const data=await res.json();
    if(!data || !Array.isArray(data.sections) || !data.sections.length) throw new Error("empty");
    warLastData=data;
    warRenderActiveTab();
  }catch(e){
    console.warn("[TGP War] Falha ao carregar/renderizar Tela de Guerra:", e);
    warShowMessage("Não foi possível carregar os dados agora. Toque em ↻ para tentar de novo.", true);
    upd.textContent="";
  }finally{
    warLoading=false;
  }
}

function warOpen(){
  warScreen.classList.add("show");
  warSetTab("br"); // Brasil é sempre a aba padrão ao abrir
  if(WAR_DEBUG_MOCK){ warLastData={updatedAt:new Date().toISOString(),sections:warMockData().sections}; warRenderActiveTab(); return; }
  warLoad();
}
function warClose(){ warScreen.classList.remove("show"); }
function warRefresh(){
  const btn=document.getElementById("war-refresh");
  btn.classList.add("spin");
  setTimeout(()=>btn.classList.remove("spin"), 600);
  warLoad();
}

document.querySelectorAll(".war-tab").forEach(b=>{

});
